name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Lint & format ──────────────────────────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check .

      - name: Ruff format check
        run: ruff format --check .

  # ── Build + test (requires CUDA runner) ────────────────────────────
  test:
    runs-on: ubuntu-latest
    container:
      image: pytorch/pytorch:2.8.0-cuda12.8-cudnn11-devel
    steps:
      - uses: actions/checkout@v4

      - name: Install package (editable + dev deps)
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest --tb=short -v
